<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PSM · Procurement & Shipment Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
--ink:#151E2B;--slate:#263449;--steel:#4C617D;--muted:#7C8BA1;
--ground:#E7ECF1;--panel:#FFFFFF;--line:#D7DEE8;--panel2:#F3F6FA;
--ember:#E0602B;
--ok:#1E8A6E;--okbg:#E4F1EC;
--flight:#3A76B8;--flightbg:#E6EEF8;
--hot:#C63F27;--hotbg:#F8E4DF;
--disp:"Space Grotesk",system-ui,sans-serif;--mono:"IBM Plex Mono",ui-monospace,monospace;--body:"Inter",system-ui,sans-serif;
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:var(--ground);color:var(--ink);font-family:var(--body);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
.app{display:grid;grid-template-columns:212px 1fr;min-height:100vh}
.rail{background:var(--slate);color:#C9D3E0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand .tick{width:26px;height:5px;background:var(--ember);border-radius:2px;margin-bottom:12px}
.brand h1{font-family:var(--disp);font-size:15px;font-weight:700;color:#fff;margin:0;letter-spacing:.02em}
.brand p{margin:3px 0 0;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#8496AC}
.nav{padding:12px 10px;display:flex;flex-direction:column;gap:2px;flex:1}
.nav button{all:unset;display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;cursor:pointer;color:#AAB7C8;font-size:13.5px;font-weight:500;position:relative;transition:background .15s,color .15s}
.nav button svg{width:17px;height:17px;flex:none;opacity:.85}
.nav button:hover{background:rgba(255,255,255,.05);color:#EAF0F7}
.nav button.on{background:rgba(224,96,43,.14);color:#fff}
.nav button.on::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;background:var(--ember);border-radius:2px}
.nav button:focus-visible{outline:2px solid var(--ember);outline-offset:2px}
.railfoot{padding:14px 18px;font-size:10.5px;color:#6E7E93;border-top:1px solid rgba(255,255,255,.08);line-height:1.5}
.main{padding:22px 26px 40px;max-width:1220px;width:100%}
.topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.topbar .hl h2{font-family:var(--disp);font-weight:600;font-size:22px;margin:0;color:var(--ink)}
.topbar .hl p{margin:4px 0 0;color:var(--steel);font-size:13px}
.tools{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search{position:relative;min-width:250px}
.search input{width:270px;border:1px solid var(--line);background:var(--panel);border-radius:9px;padding:11px 34px 11px 38px;font-family:var(--body);font-size:13.5px;color:var(--ink)}
.search input:focus{outline:2px solid var(--ember);outline-offset:1px;border-color:transparent}
.search .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted)}
.search .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:20px;height:20px;border:0;background:var(--panel2);color:var(--steel);border-radius:50%;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:13px;line-height:1;padding:0}
.search .clr:hover{background:var(--hotbg);color:var(--hot)}
.search .clr.show{display:flex}
.results{position:absolute;z-index:30;top:calc(100% + 6px);left:0;right:0;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 30px rgba(21,30,43,.14);max-height:320px;overflow:auto;display:none}
.results.show{display:block}
.results .rrow{padding:9px 13px;border-bottom:1px solid var(--panel2);cursor:pointer;display:flex;justify-content:space-between;gap:10px;align-items:center}
.results .rrow:hover{background:var(--panel2)}.results .rrow:last-child{border-bottom:0}
.results .rk{font-family:var(--mono);font-size:12.5px;color:var(--ink);font-weight:600}
.results .rt{font-size:11px;color:var(--muted)}
.results .rtag{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--steel);background:var(--panel2);padding:2px 7px;border-radius:5px}
.btn{all:unset;cursor:pointer;font-family:var(--body);font-size:12.5px;font-weight:600;padding:10px 14px;border-radius:9px;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.btn svg{width:15px;height:15px}
.btn.primary{background:var(--slate);color:#fff}.btn.primary:hover{background:var(--ink)}
.btn.ghost{background:var(--panel);color:var(--slate);border:1px solid var(--line)}.btn.ghost:hover{border-color:var(--steel)}
.btn:focus-visible{outline:2px solid var(--ember);outline-offset:2px}
.btn.hide{display:none}
.exportwrap{position:relative}
.menu{position:absolute;z-index:40;top:calc(100% + 6px);right:0;background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 30px rgba(21,30,43,.14);min-width:184px;padding:6px;display:none}
.menu.show{display:block}
.menu button{all:unset;display:flex;align-items:center;gap:10px;width:100%;box-sizing:border-box;padding:9px 11px;border-radius:7px;font-size:13px;color:var(--slate);cursor:pointer;font-weight:500}
.menu button:hover{background:var(--panel2)}
.menu button svg{width:15px;height:15px;color:var(--steel)}
.menu .mh{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:6px 11px 4px}
.chip{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:6px 13px;font-size:11.5px;color:var(--slate);display:flex;align-items:center;gap:7px;font-weight:500}
.chip b{font-family:var(--mono);font-weight:600;color:var(--ink)}
.chip.warn{background:#FCF3E8;border-color:#F0DBBE;color:#95611F}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpis.k5{grid-template-columns:repeat(5,1fr)}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 15px;position:relative;overflow:hidden}
.kpi .lab{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
.kpi .val{font-family:var(--mono);font-size:23px;font-weight:600;color:var(--ink);margin-top:7px;letter-spacing:-.01em}
.kpi .sub{font-size:11.5px;color:var(--steel);margin-top:3px}
.kpi .bar{position:absolute;left:0;top:0;bottom:0;width:4px}
.kpi.hot .bar{background:var(--hot)}.kpi.ok .bar{background:var(--ok)}.kpi.flight .bar{background:var(--flight)}.kpi.neut .bar{background:var(--steel)}
.kpi.hot .val{color:var(--hot)}
.grid{display:grid;gap:14px}.g2{grid-template-columns:1.35fr 1fr}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 17px}
.card h3{font-family:var(--disp);font-size:13.5px;font-weight:600;margin:0 0 2px;color:var(--slate)}
.card .cap{font-size:11.5px;color:var(--muted);margin:0 0 14px}
.heat{display:flex;height:34px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
.heat span{display:flex;align-items:center;justify-content:center;color:#fff;font-size:11.5px;font-weight:600;font-family:var(--mono);min-width:0;transition:flex .4s}
.legend{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap}
.legend div{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--steel)}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
.blist{display:flex;flex-direction:column;gap:11px}
.brow{display:grid;grid-template-columns:80px 1fr auto;align-items:center;gap:11px}
.brow .bn{font-size:12.5px;color:var(--slate);font-weight:500}
.brow .track{background:var(--panel2);border-radius:5px;height:22px;position:relative;overflow:hidden}
.brow .fill{height:100%;border-radius:5px;background:var(--flight)}
.brow .bv{font-family:var(--mono);font-size:12px;color:var(--ink);text-align:right;min-width:70px}
.rmk .brow{grid-template-columns:150px 1fr auto}.rmk .bn{white-space:normal;line-height:1.2}
.funnel{display:flex;flex-direction:column;gap:6px}
.fstep{display:grid;grid-template-columns:120px 1fr 42px;align-items:center;gap:10px}
.fstep .fn{font-size:12px;color:var(--slate)}.fstep .fbar{height:26px;border-radius:6px;background:var(--flightbg);position:relative;overflow:hidden}
.fstep .ff{height:100%;background:var(--flight);border-radius:6px;opacity:.85}.fstep .fc{font-family:var(--mono);font-size:12.5px;text-align:right;color:var(--ink);font-weight:600}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel)}
td{padding:9px 10px;border-bottom:1px solid var(--panel2);color:var(--ink)}
tr:last-child td{border-bottom:0}tbody tr{cursor:pointer}tbody tr:hover{background:var(--panel2)}
.mono{font-family:var(--mono)}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;white-space:nowrap}
.tag::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.9}
.t-ok{color:var(--ok);background:var(--okbg)}.t-flight{color:var(--flight);background:var(--flightbg)}.t-hot{color:var(--hot);background:var(--hotbg)}
.right{text-align:right}.center{text-align:center}
.tablewrap{max-height:440px;overflow:auto;border:1px solid var(--line);border-radius:10px}
.tablewrap table th{border-bottom:1px solid var(--line)}
/* timeline (fixed logical sequence) */
.tl{display:flex;align-items:flex-start;margin:22px 4px 6px;position:relative}
.tl .stg{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;padding:0 4px}
.tl .seg{position:absolute;top:9px;left:-50%;width:100%;height:3px;background:var(--line);z-index:0}
.tl .stg:first-child .seg{display:none}
.tl .seg.done{background:var(--flight)}
.tl .dot{width:19px;height:19px;border-radius:50%;background:#fff;border:3px solid var(--line);z-index:1}
.tl .stg.done .dot{border-color:var(--flight);background:var(--flight)}
.tl .stg.ok .dot{border-color:var(--ok);background:var(--ok)}
.tl .stg.hot .dot{border-color:var(--hot);background:var(--hot)}
.tl .nm{margin-top:9px;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:600}
.tl .dt{font-family:var(--mono);font-size:11.5px;color:var(--ink);margin-top:3px}
.tl .stg.hot .dt{color:var(--hot);font-weight:600}.tl .stg.ok .dt{color:var(--ok);font-weight:600}
.tlnote{font-size:11.5px;color:var(--steel);margin-top:12px;text-align:center}
.tlnote b{color:var(--ink)}
.pohead{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin:16px 0 4px}
.pohead .m{background:var(--panel2);border-radius:9px;padding:11px 12px}
.pohead .m .l{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600}
.pohead .m .v{font-family:var(--mono);font-size:16px;font-weight:600;margin-top:4px;color:var(--ink)}
.filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.fgroup{display:flex;align-items:center;gap:0}
.fgroup .pill{background:var(--slate);color:#fff;font-family:var(--body);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;padding:9px 11px;border-radius:8px 0 0 8px}
.fgroup select{border:1px solid var(--line);border-left:0;background:var(--panel);border-radius:0 8px 8px 0;padding:9px 12px;font-family:var(--mono);font-size:12.5px;color:var(--ink);min-width:150px}
.fgroup select:focus{outline:2px solid var(--ember);outline-offset:1px}
.fcount{font-size:11.5px;color:var(--muted);margin-left:2px}
.clearbtn svg{width:14px;height:14px}
.bcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:10px;margin-bottom:16px}
.bcard{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:pointer;transition:border-color .15s,box-shadow .15s;text-align:left;position:relative;overflow:hidden}
.bcard:hover{border-color:var(--steel)}
.bcard.on{border-color:var(--ember);box-shadow:0 0 0 2px rgba(224,96,43,.16)}
.bcard .bl{font-size:10px;letter-spacing:.03em;color:var(--muted);font-weight:600;text-transform:uppercase}
.bcard .bc{font-family:var(--mono);font-size:20px;font-weight:600;margin-top:6px;color:var(--ink)}
.bcard .bv{font-size:10.5px;color:var(--steel);margin-top:2px;font-family:var(--mono)}
.bcard.hot .bc{color:var(--hot)} .bcard.hot.on{border-color:var(--hot);box-shadow:0 0 0 2px rgba(198,63,39,.16)}
.bcard.all .bc{color:var(--flight)}
.empty{padding:60px 20px;text-align:center;color:var(--muted)}
.empty svg{width:40px;height:40px;opacity:.4;margin-bottom:12px}
.dbar{height:8px;border-radius:4px;background:var(--hot);min-width:3px}
.note{font-size:11.5px;color:var(--steel);background:var(--panel2);border-left:3px solid var(--ember);border-radius:0 8px 8px 0;padding:10px 13px;margin-top:14px;line-height:1.5}
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:12px 16px;border-radius:10px;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.2);z-index:100;opacity:0;transform:translateY(8px);transition:.25s;max-width:340px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{background:var(--hot)}
@media(max-width:1000px){.app{grid-template-columns:1fr}.rail{position:static;height:auto;flex-direction:row;overflow:auto}.nav{flex-direction:row}.railfoot,.brand p{display:none}.kpis{grid-template-columns:repeat(2,1fr)}.kpis.k5{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.pohead{grid-template-columns:repeat(3,1fr)}.search input{width:200px}}
.rmk .brow{cursor:pointer;border-radius:6px}.rmk .brow:hover .bn{color:var(--ink)}.rmk .brow:hover .track{outline:1px solid var(--line)}.rmk .brow.sel .fill{background:var(--ember)}.rmk .brow.sel .bn{font-weight:700;color:var(--ink)}
.track .pct,.fbar .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--ink);text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 2px #fff;pointer-events:none;font-family:var(--mono)}
.blist.clik .brow{cursor:pointer;border-radius:6px}.blist.clik .brow:hover .bn{color:var(--ink)}.blist.clik .brow:hover .track{outline:1px solid var(--line)}.blist.clik .brow.sel .fill{background:var(--ember)}.blist.clik .brow.sel .bn{font-weight:700;color:var(--ink)}
.funnel.clik .fstep{cursor:pointer}.funnel.clik .fstep:hover .fn{color:var(--ink)}.funnel.clik .fstep:hover .fbar{outline:1px solid var(--line)}.funnel.clik .fstep.sel .ff{background:var(--ember);opacity:1}.funnel.clik .fstep.sel .fn{font-weight:700;color:var(--ink)}
td.mdesc{max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div class="brand"><div class="tick"></div><h1>PSM Control</h1><p>Procurement · Shipment</p></div>
    <nav class="nav" id="nav">
      <button data-v="overview" class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>Overview</button>
      <button data-v="po"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>PO Tracking</button>
      <button data-v="prod"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.3 7 12 12l8.7-5M12 22V12"/></svg>Products</button>
      <button data-v="aging"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2.5M9 2h6"/></svg>Aging &amp; Delays</button>
      <button data-v="exc"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg>Exceptions</button>
    </nav>
    <div class="railfoot" id="foot"></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="hl"><h2 id="ttl">Portfolio Overview</h2><p id="sub">Live status across the PSM–ET purchase book</p></div>
      <div class="tools">
        <div class="search">
          <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="q" type="text" placeholder="Search PO #, material #, product…" autocomplete="off"/>
          <button class="clr" id="clr" title="Clear search" aria-label="Clear search">✕</button>
          <div class="results" id="res"></div>
        </div>
        <div class="exportwrap">
          <button class="btn ghost" id="exportBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15V3M7 10l5 5 5-5M5 21h14"/></svg>Export<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;margin-left:-2px"><path d="m6 9 6 6 6-6"/></svg></button>
          <div class="menu" id="exportMenu">
            <div class="mh">Download results</div>
            <button onclick="exportPDF()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>PDF report</button>
            <button onclick="exportExcel()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 3v18M3 9h18"/></svg>Excel workbook</button>
          </div>
        </div>
        <button class="btn primary" id="upload"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12M7 8l5-5 5 5M5 21h14"/></svg>Update data</button>
        <button class="btn ghost hide" id="export"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15V3M7 10l5 5 5-5M5 21h14"/></svg>Download data.json</button>
        <input type="file" id="file" accept=".xlsx,.xls,.csv" style="display:none"/>
      </div>
    </div>
    <div id="view"></div>
  </main>

<script>/* Shared cleaning engine — new "Database" schema, backward-compatible with the old one. */
function pick(row,...names){for(const n of names){for(const k in row){if(String(k).trim().toLowerCase()===n.trim().toLowerCase())return row[k];}}return null;}
function toDate(v){
  if(v==null||v==='')return null;
  if(v instanceof Date)return isNaN(v)?null:new Date(Date.UTC(v.getFullYear(),v.getMonth(),v.getDate()));
  if(typeof v==='number'){const d=new Date(Math.round((v-25569)*86400*1000));return isNaN(d)?null:new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate()));}
  const d=new Date(String(v).trim());return isNaN(d)?null:new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
}
const iso=d=>d?d.toISOString().slice(0,10):null;
const monLabel=d=>d?d.toLocaleDateString('en-US',{month:'short',year:'numeric'}):null;
function parseTF(v){
  if(v==null||String(v).trim()==='')return{cat:'Unknown',rem:null,delay:null};
  const s=String(v);const m=s.match(/(\d+)/);const n=m?+m[1]:null;
  if(/delay|overdue|late/i.test(s))return{cat:'Delayed',rem:null,delay:n};
  if(/remaining/i.test(s))return{cat:'On Track',rem:n,delay:null};
  return{cat:'On Time',rem:0,delay:0};
}
function oldStatusStage(v){ // only for legacy STATUS text
  if(v==null)return'Scheduled';const s=String(v).trim().toLowerCase();
  if(s.includes('ship'))return'Shipped';if(s.includes('complete'))return'Completed';
  if(s.includes('qc submitted')||s.includes('parts ready'))return'QC Submitted';
  if(s.includes('qc approved')||s.includes('pickup'))return'Ready for Pickup';
  if(s.includes('approved'))return'Approved';return String(v).trim();
}
function deriveState(cur,stage,tfCat){
  const c=((cur==null?'':cur)+' '+(stage==null?'':stage)).toLowerCase();
  if(c.includes('shipped')||c.includes('delivered')||c.includes('complete'))return'Delivered - On Time';
  if(tfCat==='Delayed')return'Overdue';
  return'Pending - On Track';
}
function buildDataset(rows){
  const recs=[];
  for(const row of rows){
    const poRaw=pick(row,'PSM PO#');if(poRaw==null||String(poRaw).trim()==='')continue;
    const po=String(Math.round(Number(poRaw))||poRaw).trim();
    const tf=parseTF(pick(row,'Time Frame'));
    // status + workflow stage + current ETA (revShip)
    const curStatus=pick(row,'Current Status'); const oldStatus=pick(row,'STATUS');
    const rtsRaw=pick(row,'ET RTS Date');
    let stage,revShip;
    if(curStatus!=null && String(curStatus).trim()!==''){ stage=String(curStatus).trim(); revShip=toDate(rtsRaw); }
    else { const d=toDate(oldStatus); if(d){stage='Scheduled';revShip=d;} else {stage=oldStatusStage(oldStatus);revShip=toDate(rtsRaw);} }
    const deliveryStatus=pick(row,'Delivery Status');
    const state=deriveState(curStatus!=null?curStatus:deliveryStatus, stage, tf.cat);
    const orderQty=Math.round(Number(pick(row,'Order Quantity'))||0);
    const value=Number(pick(row,'Total Value','Total Price'))||0;
    const unit=orderQty>0?value/orderQty:0;
    const pendRaw=pick(row,'Still to be delivered (qty)');
    let delivQ,pendQ;
    if(state==='Delivered - On Time'){delivQ=orderQty;pendQ=0;}
    else if(pendRaw!=null && String(pendRaw).trim()!=='' && !isNaN(Number(pendRaw))){pendQ=Math.round(Number(pendRaw));delivQ=Math.max(0,orderQty-pendQ);}
    else {pendQ=orderQty;delivQ=0;}
    const pendValue=+(pendQ*unit).toFixed(2);
    const poDate=toDate(pick(row,'PSM PO DATE'));
    const lineNo=pick(row,'Line Item#');
    recs.push({
      po,line:lineNo==null?null:Math.round(Number(lineNo)),
      material:String(pick(row,'Material#')??'').trim(),
      desc:String(pick(row,'Material Description')??''),
      product:(()=>{const p=pick(row,'Products');return p==null||String(p).trim()===''?'Unspecified':String(p).trim();})(),
      plant:String(pick(row,'Supplying Plant')??''),supplier:String(pick(row,'Supplier')??''),
      buyer:String(pick(row,'Buyer')??'').trim(),category:String(pick(row,'PO Category')??'').trim(),rmStatus:String(pick(row,'RM Status')??'').trim(),
      remarks:String(pick(row,'Remarks')??'').trim(),
      state,stage,
      poDate:iso(poDate),reqDate:iso(toDate(pick(row,'PSM Required Date','PSM Delivery Date'))),
      expShip:iso(toDate(pick(row,'ET Promised Date','ET Expected Ship Date'))),
      actShip:iso(toDate(pick(row,'Actual Ship date','ET Actual Ship date'))),revShip:iso(revShip),
      orderQty,delivQty:delivQ,pendQty:pendQ,value:+value.toFixed(2),pendValue,
      delay:tf.delay==null?null:Math.round(tf.delay),remaining:tf.rem==null?null:Math.round(tf.rem),
      poMonth:monLabel(poDate)
    });
  }
  const dts=recs.map(r=>r.poDate).filter(Boolean).sort();
  const meta={supplier:(recs.find(r=>r.supplier)||{}).supplier||'—',plant:(recs.find(r=>r.plant)||{}).plant||'—',
    generated:new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}),
    poMin:dts[0]||null,poMax:dts[dts.length-1]||null};
  return{meta,records:recs};
}
if(typeof module!=='undefined')module.exports={buildDataset,parseTF,deriveState,toDate};
</script>
<script>
const $=s=>document.querySelector(s);
const usd=n=>'$'+Math.round(n).toLocaleString('en-US');
const usdK=n=>n>=1e6?'$'+(n/1e6).toFixed(2)+'M':n>=1e3?'$'+(n/1e3).toFixed(0)+'K':'$'+Math.round(n);
const num=n=>Math.round(n).toLocaleString('en-US');
const fmtd=s=>{if(!s)return '—';const d=new Date(s);return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'});};
const sum=(a,f)=>a.reduce((s,x)=>s+(f(x)||0),0);const uniq=(a,f)=>new Set(a.map(f)).size;
const STATE={'Delivered - On Time':'t-ok','Pending - On Track':'t-flight','Overdue':'t-hot','Pending - Unclassified':'t-flight'};
const STATES=['Delivered - On Time','Pending - On Track','Overdue','Pending - Unclassified'];
const stateShort=s=>s==='Delivered - On Time'?'Delivered':s==='Overdue'?'Overdue':s==='Pending - Unclassified'?'Pending':'On Track';

let R=[],M={},K={},view='overview',exportJSON=null;
function computeK(){
  K={poValue:sum(R,x=>x.value),pendValue:sum(R,x=>x.pendValue),pos:uniq(R,x=>x.po),lines:R.length,
    materials:uniq(R,x=>x.material),prods:uniq(R,x=>x.product),orderQ:sum(R,x=>x.orderQty),
    delivQ:sum(R,x=>x.delivQty),pendQ:sum(R,x=>x.pendQty),
    overdue:R.filter(x=>x.state==='Overdue'),delivered:R.filter(x=>x.state==='Delivered - On Time'),
    ontrack:R.filter(x=>x.state==='Pending - On Track')};
  K.overdueVal=sum(K.overdue,x=>x.pendValue);K.compl=K.orderQ?K.delivQ/K.orderQ:0;
  K.deliveredVal=sum(K.delivered,x=>x.value);
  K.overdueRate=K.lines?K.overdue.length/K.lines:0;K.avgDelay=K.overdue.length?sum(K.overdue,x=>x.delay)/K.overdue.length:0;
}
function setDataset(ds){R=ds.records;M=ds.meta;
  M.generated=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  computeK();
  $('#foot').innerHTML=`Source: PSM working file<br>${M.poMin?fmtd(M.poMin):''} – ${M.poMax?fmtd(M.poMax):''}<br>Data as of ${M.generated}`;
  go(view);}
function toast(msg,err){const t=$('#toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',3200);}

/* KPI helper */
function kpi(lab,val,sub,cls){return `<div class="kpi ${cls||'neut'}"><div class="bar"></div><div class="lab">${lab}</div><div class="val">${val}</div><div class="sub">${sub||''}</div></div>`;}
function selectGroup(label,id,opts,cur,handler){
  return `<div class="fgroup"><span class="pill">${label}</span><select id="${id}" onchange="${handler}(this.value)">${opts.map(o=>`<option value="${o.v}" ${o.v===cur?'selected':''}>${o.t}</option>`).join('')}</select></div>`;}
function clearBtn(fn){return `<button class="btn ghost clearbtn" onclick="${fn}()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6M10 11v6M14 11v6"/></svg>Clear filters</button>`;}

/* ================= OVERVIEW ================= */
function monthTrend(){
  const map={};R.forEach(x=>{if(!x.poMonth)return;(map[x.poMonth]=map[x.poMonth]||{v:0,po:new Set()});map[x.poMonth].v+=x.value;map[x.poMonth].po.add(x.po);});
  const keys=Object.keys(map).sort((a,b)=>new Date('1 '+a)-new Date('1 '+b));
  const pts=keys.map(k=>({k,v:map[k].v,po:map[k].po.size}));if(!pts.length)return '<div class="empty">No dated POs.</div>';
  const W=560,H=190,maxV=Math.max(...pts.map(p=>p.v))||1;
  const x=i=>12+i*((W-24)/Math.max(1,pts.length-1));const y=v=>H-24-(v/maxV)*(H-64);
  let area=`M ${x(0)} ${H-24}`,line='';
  pts.forEach((p,i)=>{area+=` L ${x(i)} ${y(p.v)}`;line+=(i?'L':'M')+` ${x(i)} ${y(p.v)} `;});
  area+=` L ${x(pts.length-1)} ${H-24} Z`;
  const dots=pts.map((p,i)=>`<circle cx="${x(i)}" cy="${y(p.v)}" r="2.6" fill="var(--flight)"><title>${p.k}: ${usd(p.v)} · ${p.po} PO</title></circle>`).join('');
  const vlabs=pts.map((p,i)=>`<text x="${x(i)}" y="${y(p.v)-7}" font-size="7" fill="var(--slate)" font-family="var(--mono)" text-anchor="start" transform="rotate(-45 ${x(i)} ${y(p.v)-7})">${usdK(p.v)}</text>`).join('');
  const labs=pts.map((p,i)=>(i%Math.ceil(pts.length/9)===0)?`<text x="${x(i)}" y="${H-8}" font-size="8" fill="var(--muted)" text-anchor="middle" font-family="var(--mono)">${p.k.split(' ')[0]} ${p.k.split(' ')[1].slice(2)}</text>`:'').join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="height:210px">
    <defs><linearGradient id="ar" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#3A76B8" stop-opacity=".22"/><stop offset="1" stop-color="#3A76B8" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#ar)"/><path d="${line}" fill="none" stroke="var(--flight)" stroke-width="2"/>${dots}${vlabs}${labs}</svg>`;
}
function prodBars(){
  const map={};R.forEach(x=>{(map[x.product]=map[x.product]||{v:0,q:0,po:new Set()});map[x.product].v+=x.value;map[x.product].q+=x.orderQty;map[x.product].po.add(x.po);});
  const rows=Object.entries(map).sort((a,b)=>b[1].v-a[1].v);const mx=Math.max(...rows.map(r=>r[1].v))||1;const tot=sum(rows,r=>r[1].v)||1;
  return `<div class="blist clik">`+rows.map(([n,d])=>{const pct=d.v/tot*100;return `<div class="brow ${prodSel===n?'sel':''}" onclick="selProd('${n.replace(/'/g,"\\'")}')"><div class="bn" title="${n}">${n}</div><div class="track"><div class="fill" style="width:${Math.max(4,d.v/mx*100)}%"></div><span class="pct">${pct.toFixed(1)}%</span></div><div class="bv" style="line-height:1.25">${usdK(d.v)}<br><span style="font-size:10px;color:var(--muted)">${num(d.q)} u · ${d.po.size} PO</span></div></div>`;}).join('')+`</div><div class="note" style="margin-top:10px">Click a product to see its purchase orders.</div>`;
}
function funnel(){
  const order=['In-Process','Material Ready to Ship','Shipped','Scheduled','Approved','QC Submitted','Ready for Pickup','Completed'];
  const m={};R.forEach(x=>{(m[x.stage]=m[x.stage]||{n:0,q:0,v:0,po:new Set()});m[x.stage].n++;m[x.stage].q+=x.orderQty;m[x.stage].v+=x.value;m[x.stage].po.add(x.po);});
  const rows=order.filter(s=>m[s]).map(s=>[s,m[s]]);const mx=Math.max(...rows.map(r=>r[1].v))||1;const tot=sum(rows,r=>r[1].v)||1;
  return `<div class="funnel clik">`+rows.map(([n,d])=>{const pct=d.v/tot*100;return `<div class="fstep ${stageSel===n?'sel':''}" style="grid-template-columns:150px 1fr auto" onclick="selStage('${n.replace(/'/g,"\\'")}')"><div class="fn">${n}</div><div class="fbar"><div class="ff" style="width:${Math.max(3,d.v/mx*100)}%"></div><span class="pct">${pct.toFixed(1)}%</span></div><div class="fc" style="text-align:right;min-width:128px;line-height:1.25">${usdK(d.v)}<br><span style="font-size:10px;color:var(--muted);font-weight:400">${num(d.q)} u · ${d.po.size} PO</span></div></div>`;}).join('')+`</div><div class="note" style="margin-top:10px">Click a stage to see the purchase orders in it.</div>`;
}
function heatbar(){
  const poRank={};R.forEach(x=>{const r=x.state==='Overdue'?3:x.state==='Pending - On Track'?2:1;if(!poRank[x.po]||r>poRank[x.po])poRank[x.po]=r;});
  const g={o:0,t:0,d:0};Object.values(poRank).forEach(r=>{if(r===3)g.o++;else if(r===2)g.t++;else g.d++;});
  const tot=(g.o+g.t+g.d)||1;
  const seg=(n,cls,lab)=>`<span style="flex:${n||0.001};background:var(--${cls})" title="${lab}: ${n} POs">${n/tot>0.06?n:''}</span>`;
  return `<div class="heat">${seg(g.t,'flight','On track')}${seg(g.d,'ok','Delivered')}${seg(g.o,'hot','Overdue')}</div>
   <div class="legend"><div><i style="background:var(--flight)"></i>On-track POs · ${g.t}</div>
     <div><i style="background:var(--ok)"></i>Fully-shipped POs · ${g.d}</div>
     <div><i style="background:var(--hot)"></i>Overdue POs · ${g.o} · ${usdK(K.overdueVal)} exposed</div></div>`;
}
function topOverdue(){
  const map={};K.overdue.forEach(x=>{(map[x.po]=map[x.po]||{v:0,d:0,n:0});map[x.po].v+=x.pendValue;map[x.po].d=Math.max(map[x.po].d,x.delay||0);map[x.po].n++;});
  const rows=Object.entries(map).sort((a,b)=>b[1].v-a[1].v).slice(0,6);if(!rows.length)return '<div class="empty">No overdue POs. 🎉</div>';
  const mxd=Math.max(...rows.map(r=>r[1].d),1);
  return `<table><thead><tr><th>PO #</th><th class="center">Lines</th><th class="right">Pending value</th><th>Max delay</th></tr></thead><tbody>`+
   rows.map(([po,d])=>`<tr onclick="openPO('${po}')"><td class="mono">${po}</td><td class="center">${d.n}</td><td class="right mono">${usd(d.v)}</td><td><div style="display:flex;align-items:center;gap:8px"><div class="dbar" style="width:${d.d/mxd*90}px"></div><span class="mono" style="font-size:11px">${d.d}d</span></div></td></tr>`).join('')+`</tbody></table>`;
}
let remarkSel=null,prodSel=null,stageSel=null;
function remarksBars(){
  const order=['yet to start','forging','forging completed','machining','post machining','final inspection','awaiting qc approval','ready for pickup.','ready for pickup','completed'];
  const map={};R.forEach(x=>{const k=(x.remarks&&x.remarks.trim())?x.remarks.trim():'—';(map[k]=map[k]||{n:0,q:0,v:0,po:new Set()});map[k].n++;map[k].q+=x.orderQty;map[k].v+=x.value;map[k].po.add(x.po);});
  const rank=k=>{const i=order.indexOf(k.toLowerCase());return i<0?order.length+1:i;};
  const rows=Object.entries(map).sort((a,b)=>rank(a[0])-rank(b[0])||b[1].v-a[1].v);
  if(!rows.length)return '<div class="empty">No remarks recorded.</div>';
  const mx=Math.max(...rows.map(r=>r[1].v))||1;const tot=sum(rows,r=>r[1].v)||1;
  return `<div class="blist rmk">`+rows.map(([n,d])=>{const pct=d.v/tot*100;return `<div class="brow ${remarkSel===n?'sel':''}" onclick="selRemark('${n.replace(/'/g,"\\'")}')"><div class="bn" title="${n}">${n}</div><div class="track"><div class="fill" style="width:${Math.max(4,d.v/mx*100)}%"></div><span class="pct">${pct.toFixed(1)}%</span></div><div class="bv" style="line-height:1.25">${usdK(d.v)}<br><span style="font-size:10px;color:var(--muted)">${num(d.q)} u · ${d.n} ln · ${d.po.size} PO</span></div></div>`;}).join('')+`</div><div class="note" style="margin-top:10px">Click any stage to see the purchase orders sitting there.</div>`;
}
function poGroupDetail(title,cap,recs,clearFn,clearArg){
  if(!recs.length)return '';
  const map={};recs.forEach(x=>{(map[x.po]=map[x.po]||{n:0,q:0,v:0,pv:0,st:{}});const m=map[x.po];m.n++;m.q+=x.orderQty;m.v+=x.value;m.pv+=x.pendValue;m.st[x.state]=(m.st[x.state]||0)+1;});
  const rows=Object.entries(map).sort((a,b)=>(b[1].v-a[1].v)||((+a[0])-(+b[0])));
  return `<div class="card" style="margin-top:14px"><h3>${title} <span class="fcount">${recs.length} lines · ${uniq(recs,x=>x.po)} POs · ${num(sum(recs,x=>x.orderQty))} u · ${usdK(sum(recs,x=>x.value))}</span><button class="btn ghost" style="float:right;padding:4px 12px" onclick="${clearFn}('${String(clearArg).replace(/'/g,"\\'")}')">Close ✕</button></h3><p class="cap">${cap}</p>
   <div class="tablewrap"><table><thead><tr><th>PO #</th><th class="center">Lines</th><th class="right">Units</th><th class="right">Order value</th><th class="right">Pending value</th><th>Status mix</th></tr></thead><tbody>
   ${rows.map(([po,m])=>`<tr onclick="openPO('${po}')"><td class="mono">${po}</td><td class="center">${m.n}</td><td class="right mono">${num(m.q)}</td><td class="right mono">${usd(m.v)}</td><td class="right mono">${usd(m.pv)}</td><td>${Object.entries(m.st).sort((a,b)=>b[1]-a[1]).map(([s,c])=>`<span class="tag ${STATE[s]}" style="margin-right:4px">${stateShort(s)} ${c}</span>`).join('')}</td></tr>`).join('')}
   </tbody></table></div></div>`;
}
function remarkDetail(){if(!remarkSel)return '';return poGroupDetail(`Purchase orders at "${remarkSel}"`,'Every PO with material at this production stage — click a row to open the PO',R.filter(x=>((x.remarks&&x.remarks.trim())||'—')===remarkSel),'selRemark',remarkSel);}
function prodDetail(){if(!prodSel)return '';return poGroupDetail(`${prodSel} · purchase orders`,'Every PO carrying this product family — click a row to open the PO',R.filter(x=>x.product===prodSel),'selProd',prodSel);}
function stageDetail(){if(!stageSel)return '';return poGroupDetail(`Fulfilment stage · "${stageSel}"`,'Every PO with lines at this pipeline stage — click a row to open the PO',R.filter(x=>x.stage===stageSel),'selStage',stageSel);}
window.selRemark=n=>{remarkSel=(remarkSel===n)?null:n;renderOverview();};
window.selProd=n=>{prodSel=(prodSel===n)?null:n;renderOverview();};
window.selStage=n=>{stageSel=(stageSel===n)?null:n;renderOverview();};
function renderOverview(){
  $('#ttl').textContent='Portfolio Overview';$('#sub').textContent='Live status across the PSM–ET purchase book';
  $('#view').innerHTML=`
   <div class="filters" style="margin-bottom:16px">
     <div class="chip">Supplier <b>${M.supplier}</b></div><div class="chip">Plant <b>${M.plant}</b></div>
     <div class="chip warn">⚠ Single-source · single-plant book — concentration risk</div></div>
   <div class="kpis k5">
     ${kpi('Order Book Value',usdK(K.poValue),num(K.pos)+' POs · '+num(K.lines)+' lines','neut')}
     ${kpi('Completed Value',usdK(K.deliveredVal),num(K.delivered.length)+' lines shipped · '+num(K.delivQ)+' units','ok')}
     ${kpi('Open / Pending Value',usdK(K.pendValue),num(K.pendQ)+' of '+num(K.orderQ)+' units open','flight')}
     ${kpi('Overdue Value',usdK(K.overdueVal),K.overdue.length+' lines late · avg '+Math.round(K.avgDelay)+'d','hot')}
     ${kpi('Completion',(K.compl*100).toFixed(1)+'%',num(K.delivQ)+' units received','ok')}</div>
   <div class="grid g2" style="margin-bottom:14px">
     <div class="card"><h3>Purchase-order value by month raised</h3><p class="cap">PO issue date · USD committed (value shown at each point)</p>${monthTrend()}</div>
     <div class="card"><h3>Delivery risk profile</h3><p class="cap">Every PO, classified by its worst-case line status</p>${heatbar()}
       <div class="note">Each PO is graded by its most at-risk line: a PO with any delayed line counts as <b>Overdue</b>. Delay is read from the <b>Time Frame</b> field.</div></div></div>
   <div class="grid g2">
     <div class="card"><h3>Value by product family</h3><p class="cap">Committed USD and order quantity</p>${prodBars()}</div>
     <div class="card"><h3>Fulfilment pipeline</h3><p class="cap">Value, units and PO count by stage</p>${funnel()}</div></div>
   ${prodDetail()}${stageDetail()}
   <div class="card" style="margin-top:14px"><h3>Manufacturing progress</h3><p class="cap">Where the book sits on the shop floor · from the source <b>Remarks</b> field</p>${remarksBars()}</div>
   ${remarkDetail()}
   <div class="card" style="margin-top:14px"><h3>Top overdue POs</h3><p class="cap">Ranked by pending value at risk — click to open</p>${topOverdue()}</div>`;
}

/* ================= PO TRACKING ================= */
let curPO=null,curPOStat='__ALL__',curPOcat='__ALL__',curPObuyer='__ALL__',curPOrm='__ALL__';
const poListFrom=recs=>[...new Set(recs.map(x=>x.po))].sort((a,b)=>+a-+b);
const poList=()=>poListFrom(R);
function statusOpts(all){const set=all?new Set(R.map(x=>x.state)):null;
  return [{v:'__ALL__',t:'All statuses'}].concat(STATES.filter(s=>!all||set.has(s)).map(s=>({v:s,t:stateShort(s)+' — '+s})));}
function dimOpts(label,vals){return [{v:'__ALL__',t:'All '+label}].concat([...new Set(vals.filter(v=>v&&String(v).trim()))].sort().map(v=>({v,t:v})));}
function applyDims(recs,cat,buyer,rm){return recs.filter(x=>(cat==='__ALL__'||x.category===cat)&&(buyer==='__ALL__'||x.buyer===buyer)&&(rm==='__ALL__'||x.rmStatus===rm));}
function renderPO(po){
  if(po==='__ALL__')curPO='__ALL__';
  else if(po&&po!=='__NONE__')curPO=po;
  if(curPO==null)curPO='__ALL__';
  $('#ttl').textContent='PO Tracking';$('#sub').textContent='Full lifecycle and line-item status for any purchase order';
  const base=applyDims(R,curPOcat,curPObuyer,curPOrm);
  const poOpts=[{v:'__ALL__',t:'All POs'}].concat(poListFrom(base).map(p=>({v:p,t:p})));
  const filters=`<div class="filters">
    ${selectGroup('PO','posel',poOpts,curPO,'renderPO')}
    ${selectGroup('Status','postat',statusOpts(true),curPOStat,'filterPOStatus')}
    ${selectGroup('Category','pocat',dimOpts('categories',R.map(x=>x.category)),curPOcat,'setPOcat')}
    ${selectGroup('Buyer','pobuyer',dimOpts('buyers',R.map(x=>x.buyer)),curPObuyer,'setPObuyer')}
    ${selectGroup('RM','porm',dimOpts('RM statuses',R.map(x=>x.rmStatus)),curPOrm,'setPOrm')}
    ${clearBtn('clearPO')}</div>`;
  let body;
  if(curPO==='__ALL__'){body=allPOTable(base);}
  else{
    const all=base.filter(x=>x.po===curPO);
    const L=curPOStat==='__ALL__'?all:all.filter(x=>x.state===curPOStat);
    const oq=sum(all,x=>x.orderQty),dq=sum(all,x=>x.delivQty),pq=sum(all,x=>x.pendQty),val=sum(all,x=>x.value);
    const ovLines=all.filter(x=>x.state==='Overdue');const ovUnits=sum(ovLines,x=>x.pendQty);
    body=`
     <div class="pohead">
       <div class="m"><div class="l">Order value</div><div class="v">${usdK(val)}</div></div>
       <div class="m"><div class="l">Lines</div><div class="v">${all.length}</div></div>
       <div class="m"><div class="l">Ordered</div><div class="v">${num(oq)}</div></div>
       <div class="m"><div class="l">Received</div><div class="v">${num(dq)}</div></div>
       <div class="m"><div class="l">Pending</div><div class="v">${num(pq)}</div></div>
       <div class="m"><div class="l">Overdue units</div><div class="v" style="color:${ovUnits?'var(--hot)':'var(--ok)'}">${num(ovUnits)}<span style="font-size:11px;color:var(--muted)"> · ${ovLines.length} ln</span></div></div></div>
     <div class="card" style="margin:14px 0"><h3>PO timeline</h3><p class="cap">Raised → required → ET promised → ready-to-ship → actual ship</p>${poTimeline(all)}</div>
     <div class="card"><h3>Line items · ${curPO} <span class="fcount">${L.length} of ${all.length} shown</span></h3><p class="cap">Material-level status, quantities and value</p>
       <div class="tablewrap"><table><thead><tr><th>Line</th><th>Material</th><th>Product</th><th>Description</th><th class="right">Ord</th><th class="right">Pend</th><th class="right">Value</th><th>Promised</th><th>Current</th><th>Status</th></tr></thead><tbody>
       ${L.length?L.sort((a,b)=>(a.line||0)-(b.line||0)).map(x=>`<tr onclick="openMat('${x.material}')">
         <td class="mono">${x.line??'—'}</td><td class="mono">${x.material}</td><td>${x.product}</td><td class="mdesc" title="${(x.desc||'').replace(/"/g,'&quot;')}">${x.desc||'—'}</td>
         <td class="right mono">${x.orderQty}</td><td class="right mono">${x.pendQty}</td><td class="right mono">${usd(x.value)}</td>
         <td class="mono">${fmtd(x.expShip)}</td><td class="mono">${x.actShip?fmtd(x.actShip):x.revShip?fmtd(x.revShip):x.stage}</td>
         <td><span class="tag ${STATE[x.state]}">${stateShort(x.state)}${x.delay?' · '+x.delay+'d':''}</span></td></tr>`).join('')
         :`<tr><td colspan="10" style="text-align:center;color:var(--muted);padding:24px">No lines match on ${curPO}.</td></tr>`}
       </tbody></table></div></div>`;
  }
  $('#view').innerHTML=filters+body;
}
window.filterPOStatus=v=>{curPOStat=v;renderPO();};
window.setPOcat=v=>{curPOcat=v;renderPO();};

    const m=map[x.po];m.lines++;m.oq+=x.orderQty;m.pq+=x.pendQty;m.v+=x.value;m.pv+=x.pendValue;m.prod.add(x.product);if(x.desc&&x.desc.trim())m.desc.add(x.desc.trim());if(x.state==='Overdue'){m.ov++;m.ovq+=x.pendQty;}});
  const rows=Object.entries(map).sort((a,b)=>(+a[0])-(+b[0]));

     <div class="tablewrap"><table><thead><tr><th>PO #</th><th>Products</th><th>Material description</th><th class="center">Lines</th><th class="right">Ordered</th><th class="right">Pending</th><th class="right">Order value</th><th class="right">Pending value</th><th class="center">Overdue units</th></tr></thead><tbody>

       :`<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:24px">No POs match the current filters.</td></tr>`}
     </tbody></table></div></div>`;
}
function poTimeline(all){
  const raised=all.map(x=>x.poDate).filter(Boolean).sort()[0];
  const required=all.map(x=>x.reqDate).filter(Boolean).sort()[0];
  const promised=all.map(x=>x.expShip).filter(Boolean).sort().slice(-1)[0];
  const rts=all.map(x=>x.revShip).filter(Boolean).sort().slice(-1)[0];
  const act=all.map(x=>x.actShip).filter(Boolean).sort().slice(-1)[0];
  const allDeliv=all.length>0&&all.every(x=>x.state==='Delivered - On Time');
  const anyOver=all.some(x=>x.state==='Overdue');
  const maxDelay=Math.max(0,...all.filter(x=>x.state==='Overdue').map(x=>x.delay||0));
  const finalCls=allDeliv?'ok':anyOver?'hot':'flight';
  const readyDone=!!(rts||act);
  const stages=[
    {nm:'PO raised',dt:raised,cls:'done'},
    {nm:'Required',dt:required,cls:'done'},
    {nm:'ET promised',dt:promised,cls:readyDone?'done':''},
    {nm:'Ready to ship',dt:rts,cls:readyDone?'done':''},
    {nm:act?'Actual ship':'Ship (pending)',dt:act,cls:finalCls+(allDeliv?' done':'')}
  ];
  const doneIdx=allDeliv?4:(rts?3:2);
  const html=stages.map((s,i)=>`<div class="stg ${s.cls}"><div class="seg ${i>0&&i<=doneIdx?'done':''}"></div><div class="dot"></div><div class="nm">${s.nm}</div><div class="dt">${fmtd(s.dt)}${i===4&&anyOver?` · +${maxDelay}d`:''}</div></div>`).join('');
  let note='';
  if(required&&promised){const dd=Math.round((new Date(promised)-new Date(required))/864e5);
    note = allDeliv ? `<b>Shipped.</b> Full PO shipped by ${fmtd(act)}.`
      : anyOver ? `<b>${maxDelay} days behind</b> on material — promised ship ${fmtd(promised)}.`
      : dd>0 ? `Promised ship is <b>${dd} days after</b> the required date — worth confirming with ${M.supplier}.`
      : `On track — promised ship ${fmtd(promised)}${rts?', ready-to-ship '+fmtd(rts):''}.`;}
  return `<div class="tl">${html}</div><div class="tlnote">${note}</div>`;
}

const AGE=[{k:'b15',t:'Due ≤ 15 days',lo:0,hi:15},{k:'b30',t:'16 – 30 days',lo:16,hi:30},{k:'b45',t:'31 – 45 days',lo:31,hi:45},{k:'b60',t:'46 – 60 days',lo:46,hi:60},{k:'b90',t:'61 – 90 days',lo:61,hi:90},{k:'b90p',t:'90 days +',lo:91,hi:1e9}];
let ageBucket='all',ageMode='buckets',ageProd='__ALL__';
function agingRecs(){
  const today=Date.parse(new Date().toISOString().slice(0,10));
  return R.filter(x=>x.state!=='Delivered - On Time').map(x=>{
    const eta=x.revShip||x.expShip;
    let days=x.remaining!=null?x.remaining:(eta?Math.round((Date.parse(eta)-today)/864e5):null);
    let bucket;
    if(x.state==='Overdue')bucket='overdue';
    else if(days==null)bucket='undated';
    else{if(days<0)days=0;const b=AGE.find(a=>days>=a.lo&&days<=a.hi);bucket=b?b.k:'b90p';}
    return Object.assign({},x,{eta,days,bucket});
  });
}
function renderAging(sel){
  $('#ttl').textContent='Aging & Delays';$('#sub').textContent='When open lines are due to ship — and what is already late';
  let recs=agingRecs();if(ageProd!=='__ALL__')recs=recs.filter(x=>x.product===ageProd);
  const prodOpts=[{v:'__ALL__',t:'All products'}].concat([...new Set(R.map(x=>x.product))].sort().map(p=>({v:p,t:p})));
  const filters=`<div class="filters">
     ${selectGroup('Product','agpr',prodOpts,ageProd,'onAgeProd')}
     <button class="btn ${ageMode==='delay'?'primary':'ghost'}" onclick="setMode('delay')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg>Show delays</button>
     <button class="btn ${ageMode==='ontime'?'primary':'ghost'}" onclick="setMode('ontime')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>Show on-time</button>
     ${clearBtn('clearAging')}</div>`;
  // bucket cards
  const cnt=k=>recs.filter(x=>k==='all'?true:x.bucket===k);
  const undated=recs.filter(x=>x.bucket==='undated').length;
  const cardDefs=[{k:'all',t:'All open',cls:'all'}].concat(AGE.map(a=>({k:a.k,t:a.t,cls:''}))).concat([{k:'overdue',t:'Overdue',cls:'hot'}]);
  if(undated)cardDefs.push({k:'undated',t:'No ship date',cls:''});
  const cards=`<div class="bcards">`+cardDefs.map(c=>{const r=cnt(c.k);const v=sum(r,x=>x.pendValue);const u=sum(r,x=>x.pendQty);const p=uniq(r,x=>x.po);
    return `<div class="bcard ${c.cls} ${(ageMode==='buckets'&&ageBucket===c.k)?'on':''}" onclick="setBucket('${c.k}')"><div class="bl">${c.t}</div><div class="bc">${num(u)}<span style="font-size:10px;color:var(--muted);font-weight:400"> u</span></div><div class="bv">${p} PO · ${usdK(v)}</div></div>`;}).join('')+`</div>`;
  let content;
  if(ageMode==='delay'){content=groupBreakdown(recs.filter(x=>x.state==='Overdue'),'delay');}
  else if(ageMode==='ontime'){content=groupBreakdown(recs.filter(x=>x.state==='Pending - On Track'),'ontime');}
  else{
    let L=ageBucket==='all'?recs:recs.filter(x=>x.bucket===ageBucket);

    const label=ageBucket==='all'?'All open lines':(cardDefs.find(c=>c.k===ageBucket)||{}).t;
    content=`<div class="card"><h3>${label} <span class="fcount">${num(sum(L,x=>x.pendQty))} units · ${uniq(L,x=>x.po)} POs · ${usdK(sum(L,x=>x.pendValue))} pending</span></h3><p class="cap">Ship ETA uses ET RTS Date where the material is ready, otherwise ET Promised Date. Click a row to open its PO.</p>
     <div class="tablewrap"><table><thead><tr><th>PO #</th><th>Material</th><th>Product</th><th class="right">Pend qty</th><th class="right">Pend value</th><th>Ship ETA</th><th>Window</th><th>Status</th></tr></thead><tbody>
     ${L.length?L.map(x=>`<tr onclick="openPO('${x.po}')"><td class="mono">${x.po}</td><td class="mono">${x.material}</td><td>${x.product}</td><td class="right mono">${x.pendQty}</td><td class="right mono">${usd(x.pendValue)}</td><td class="mono">${fmtd(x.eta)}</td><td class="mono">${x.state==='Overdue'?`<span style="color:var(--hot)">+${x.delay||Math.abs(x.days||0)}d late</span>`:x.days==null?'—':'in '+x.days+'d'}</td><td><span class="tag ${STATE[x.state]}">${stateShort(x.state)}</span></td></tr>`).join('')

function groupBreakdown(recs,kind){
  const hot=kind==='delay';
  if(!recs.length)return `<div class="card"><div class="empty">No ${hot?'delayed':'on-track'} lines${ageProd!=='__ALL__'?' for '+ageProd:''}.</div></div>`;
  const byPO={},byMat={};
  recs.forEach(x=>{
    (byPO[x.po]=byPO[x.po]||{n:0,pv:0,pq:0,d:0,eta:null});const p=byPO[x.po];p.n++;p.pv+=x.pendValue;p.pq+=x.pendQty;p.d=Math.max(p.d,x.delay||0);if(x.eta&&(!p.eta||x.eta<p.eta))p.eta=x.eta;
    (byMat[x.material]=byMat[x.material]||{desc:x.desc,prod:x.product,n:0,pv:0,pq:0,d:0,eta:null});const m=byMat[x.material];m.n++;m.pv+=x.pendValue;m.pq+=x.pendQty;m.d=Math.max(m.d,x.delay||0);if(x.eta&&(!m.eta||x.eta<m.eta))m.eta=x.eta;});
  const poRows=Object.entries(byPO).sort((a,b)=>b[1].pv-a[1].pv);
  const matRows=Object.entries(byMat).sort((a,b)=>b[1].pv-a[1].pv);
  const mHead=hot?'Max delay':'Next ship';
  const mCell=m=>hot?`<td class="mono" style="color:var(--hot);font-weight:600">${m.d}d</td>`:`<td class="mono" style="color:var(--ok);font-weight:600">${fmtd(m.eta)}</td>`;
  const lineHead=hot?'Late lines':'On-time lines';
  const tail=hot?'at risk':'on schedule';
  const poT=`<div class="card"><h3>${hot?'Delays':'On-time'} by PO <span class="fcount">${poRows.length} POs · ${usdK(sum(poRows,r=>r[1].pv))} ${tail}</span></h3><p class="cap">Ranked by pending value — click to open the PO</p>
    <div class="tablewrap"><table><thead><tr><th>PO #</th><th class="center">${lineHead}</th><th class="right">Pend qty</th><th class="right">Pend value</th><th>${mHead}</th></tr></thead><tbody>
    ${poRows.map(([po,m])=>`<tr onclick="openPO('${po}')"><td class="mono">${po}</td><td class="center">${m.n}</td><td class="right mono">${num(m.pq)}</td><td class="right mono">${usd(m.pv)}</td>${mCell(m)}</tr>`).join('')}
    </tbody></table></div></div>`;
  const matT=`<div class="card"><h3>${hot?'Delays':'On-time'} by material <span class="fcount">${matRows.length} materials</span></h3><p class="cap">Ranked by pending value — click to trace the material</p>
    <div class="tablewrap"><table><thead><tr><th>Material</th><th>Description</th><th>Product</th><th class="center">${lineHead}</th><th class="right">Pend value</th><th>${mHead}</th></tr></thead><tbody>
    ${matRows.map(([mid,m])=>`<tr onclick="openMat('${mid}')"><td class="mono">${mid}</td><td>${m.desc}</td><td>${m.prod}</td><td class="center">${m.n}</td><td class="right mono">${usd(m.pv)}</td>${mCell(m)}</tr>`).join('')}
    </tbody></table></div></div>`;
  return `<div class="grid" style="gap:14px">${poT}${matT}</div>`;
}

window.openPO=po=>{curPO=po;curPOStat='__ALL__';go('po');};
window.openMat=mid=>{const rec=R.find(x=>x.material===mid);if(rec){curProd='__ALL__';curMat=mid;curProdStat='__ALL__';go('prod');}};
window.renderPO=renderPO;window.renderProd=renderProd;

/* ---- search + reset ---- */
const q=$('#q'),res=$('#res'),clr=$('#clr');
function resetSearch(){q.value='';res.classList.remove('show');res.innerHTML='';clr.classList.remove('show');q.focus();}
clr.onclick=resetSearch;
function doSearch(v){
  clr.classList.toggle('show',!!v.trim());
  v=v.trim().toLowerCase();if(!v){res.classList.remove('show');return;}
  const out=[];
  poList().filter(p=>p.toLowerCase().includes(v)).slice(0,6).forEach(p=>{const L=R.filter(x=>x.po===p);out.push({k:p,t:L.length+' lines · '+usdK(sum(L,x=>x.value)),tag:'PO',act:()=>openPO(p)});});
  [...new Set(R.map(x=>x.material))].filter(m=>m.toLowerCase().includes(v)).slice(0,6).forEach(m=>{const rec=R.find(x=>x.material===m);out.push({k:m,t:(rec.desc||'').slice(0,42),tag:'Material',act:()=>openMat(m)});});
  [...new Set(R.map(x=>x.product))].filter(p=>p.toLowerCase().includes(v)).forEach(p=>{out.push({k:p,t:R.filter(x=>x.product===p).length+' lines',tag:'Product',act:()=>{curProd=p;curMat='__ALL__';curProdStat='__ALL__';go('prod');}});});
  if(!out.length){res.innerHTML='<div class="rrow"><span class="rt">No PO, material or product matches.</span></div>';res.classList.add('show');return;}
  res.innerHTML=out.slice(0,12).map((o,i)=>`<div class="rrow" data-i="${i}"><div><div class="rk">${o.k}</div><div class="rt">${o.t}</div></div><span class="rtag">${o.tag}</span></div>`).join('');
  res.querySelectorAll('.rrow').forEach((row,i)=>{if(out[i].act)row.onclick=()=>{out[i].act();resetSearch();};});
  res.classList.add('show');
}
q.addEventListener('input',e=>doSearch(e.target.value));
q.addEventListener('keydown',e=>{if(e.key==='Enter'){const f=res.querySelector('.rrow');if(f)f.click();}if(e.key==='Escape')resetSearch();});
document.addEventListener('click',e=>{if(!e.target.closest('.search'))res.classList.remove('show');});

/* ---- data update: upload xlsx -> clean -> render -> export json ---- */
$('#upload').onclick=()=>$('#file').click();
$('#file').onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=ev=>{try{
    const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{defval:null});
    const ds=buildDataset(rows);
    if(!ds.records.length){toast('No PO rows found in that file — check the sheet.',true);return;}
    exportJSON=JSON.stringify(ds);$('#export').classList.remove('hide');
    setDataset(ds);
    toast('Loaded '+ds.records.length+' lines · '+ds.meta.generated+'. Click "Download data.json" to publish.');
  }catch(err){toast('Could not read that file: '+err.message,true);}};
  rd.readAsArrayBuffer(f);e.target.value='';
};
$('#export').onclick=()=>{
  const blob=new Blob([exportJSON||JSON.stringify({meta:M,records:R})],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='data.json';a.click();URL.revokeObjectURL(a.href);
  toast('data.json downloaded — replace the file in your GitHub repo to update the live dashboard.');
};

/* ---- exports: PDF / Excel / PowerPoint ---- */
const eBtn=$('#exportBtn'),eMenu=$('#exportMenu');
eBtn.onclick=e=>{e.stopPropagation();eMenu.classList.toggle('show');};
document.addEventListener('click',e=>{if(!e.target.closest('.exportwrap'))eMenu.classList.remove('show');});
function closeMenu(){eMenu.classList.remove('show');}
const fmtDMY=s=>s?new Date(s).toLocaleDateString('en-GB'):'';
const AGELBL={b15:'Due <=15 days',b30:'16-30 days',b45:'31-45 days',b60:'46-60 days',b90:'61-90 days',b90p:'90 days+',overdue:'Overdue',undated:'No ship date'};
function currentScope(){
  let recs,title,sub;
  if(view==='po'){
    if(curPO==='__ALL__'){recs=curPOStat==='__ALL__'?R:R.filter(x=>x.state===curPOStat);title='All POs';sub=curPOStat==='__ALL__'?'All statuses':stateShort(curPOStat)+' lines';}
    else{const a=R.filter(x=>x.po===curPO);recs=curPOStat==='__ALL__'?a:a.filter(x=>x.state===curPOStat);title='PO '+curPO;sub=curPOStat==='__ALL__'?'All lines':stateShort(curPOStat)+' lines';}
  }else if(view==='prod'){
    let a=R;if(curProd!=='__ALL__')a=a.filter(x=>x.product===curProd);if(curMat!=='__ALL__')a=a.filter(x=>x.material===curMat);if(curProdStat!=='__ALL__')a=a.filter(x=>x.state===curProdStat);
    recs=a;title='Products';sub=[curProd==='__ALL__'?'All products':curProd,curMat==='__ALL__'?null:'Material '+curMat,curProdStat==='__ALL__'?null:stateShort(curProdStat)].filter(Boolean).join(' · ');
  }else if(view==='aging'){
    let base=agingRecs();if(ageProd!=='__ALL__')base=base.filter(x=>x.product===ageProd);
    const pf=ageProd==='__ALL__'?'':' · '+ageProd;
    if(ageMode==='delay'){recs=base.filter(x=>x.state==='Overdue');title='Delayed orders';sub='Overdue lines'+pf;}
    else if(ageMode==='ontime'){recs=base.filter(x=>x.state==='Pending - On Track');title='On-time orders';sub='On-track lines'+pf;}
    else{recs=ageBucket==='all'?base:base.filter(x=>x.bucket===ageBucket);title='Aging';sub=(ageBucket==='all'?'All open lines':AGELBL[ageBucket])+pf;}
  }else if(view==='exc'){recs=[...K.overdue].sort((a,b)=>(b.delay||0)-(a.delay||0));title='Exceptions';sub='Overdue lines only';}
  else{recs=R;title='Portfolio overview';sub='All data — no filter applied';}
  return {recs,title,sub};
}
function scopedTables(recs){
  const val=sum(recs,x=>x.value),pv=sum(recs,x=>x.pendValue),ov=recs.filter(x=>x.state==='Overdue');
  const kpis=[['Lines',String(recs.length)],['POs',String(uniq(recs,x=>x.po))],['Materials',String(uniq(recs,x=>x.material))],
    ['Order value',usd(val)],['Pending value',usd(pv)],['Ordered qty',num(sum(recs,x=>x.orderQty))],
    ['Pending qty',num(sum(recs,x=>x.pendQty))],['Overdue lines',String(ov.length)],['Overdue value',usd(sum(ov,x=>x.pendValue))]];
  const pm={};recs.forEach(x=>{(pm[x.po]=pm[x.po]||{l:0,oq:0,pq:0,v:0,pv:0,ov:0,d:0});const m=pm[x.po];m.l++;m.oq+=x.orderQty;m.pq+=x.pendQty;m.v+=x.value;m.pv+=x.pendValue;if(x.state==='Overdue'){m.ov++;m.d=Math.max(m.d,x.delay||0);}});
  const byPO=Object.entries(pm).sort((a,b)=>(b[1].pv-a[1].pv)||((+a[0])-(+b[0]))).map(([k,m])=>[k,m.l,num(m.oq),num(m.pq),usd(m.v),usd(m.pv),m.ov,m.ov?m.d+'d':'-']);
  const mm={};recs.forEach(x=>{(mm[x.material]=mm[x.material]||{desc:x.desc,prod:x.product,l:0,pq:0,pv:0,ov:0,d:0});const m=mm[x.material];m.l++;m.pq+=x.pendQty;m.pv+=x.pendValue;if(x.state==='Overdue'){m.ov++;m.d=Math.max(m.d,x.delay||0);}});
  const byMat=Object.entries(mm).sort((a,b)=>b[1].pv-a[1].pv).map(([k,m])=>[k,m.desc,m.prod,m.l,num(m.pq),usd(m.pv),m.ov,m.ov?m.d+'d':'-']);
  const rm={};recs.forEach(x=>{(rm[x.product]=rm[x.product]||{l:0,oq:0,dq:0,pq:0,v:0,pv:0});const m=rm[x.product];m.l++;m.oq+=x.orderQty;m.dq+=x.delivQty;m.pq+=x.pendQty;m.v+=x.value;m.pv+=x.pendValue;});
  const byProd=Object.entries(rm).sort((a,b)=>b[1].v-a[1].v).map(([k,m])=>[k,m.l,num(m.oq),num(m.dq),num(m.pq),usd(m.v),usd(m.pv),(m.oq?(m.dq/m.oq*100):0).toFixed(1)+'%']);
  const lines=recs.slice().sort((a,b)=>((+b.po)-(+a.po))||((a.line||0)-(b.line||0))).map(x=>[x.po,x.line,x.material,x.desc,x.product,stateShort(x.state),x.orderQty,x.pendQty,Math.round(x.value),Math.round(x.pendValue),fmtDMY(x.expShip),x.actShip?fmtDMY(x.actShip):(x.revShip?fmtDMY(x.revShip):x.stage),x.delay==null?'':x.delay,x.remaining==null?'':x.remaining]);
  return {kpis,byPO,byMat,byProd,lines,multiProd:Object.keys(rm).length>1};
}
function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'').slice(0,50);}
const LIBS={jspdf:'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js',autotable:'https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js'};
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error('offline'));document.head.appendChild(s);});}
async function ensurePDF(){if(!window.jspdf)await loadScript(LIBS.jspdf);if(!window.jspdf.jsPDF.API.autoTable)await loadScript(LIBS.autotable);}

function exportExcel(){closeMenu();try{
  if(typeof XLSX==='undefined'){toast('Export engine still loading — try again in a moment.',true);return;}
  const sc=currentScope(),T=scopedTables(sc.recs);
  if(!sc.recs.length){toast('Nothing to export in this view.',true);return;}
  const wb=XLSX.utils.book_new();
  const add=(n,h,r)=>XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([h,...r]),n.slice(0,31));
  add('Summary',['Metric','Value'],[['View',sc.title],['Filter',sc.sub],['Supplier',M.supplier],['Plant',M.plant],['Data as of',M.generated],['',''],...T.kpis]);
  add('By PO',['PO #','Lines','Ordered','Pending','Order value (USD)','Pending value (USD)','Overdue lines','Max delay'],T.byPO);
  add('By Material',['Material','Description','Product','Lines','Pending qty','Pending value (USD)','Overdue lines','Max delay'],T.byMat);
  if(T.multiProd)add('By Product',['Product','Lines','Ordered','Delivered','Pending','Order value (USD)','Pending value (USD)','Completion'],T.byProd);
  add('Line Data',['PO','Line','Material','Description','Product','State','Order qty','Pending qty','Value (USD)','Pending value (USD)','Exp ship','Current / ETA','Delay days','Days remaining'],T.lines);
  XLSX.writeFile(wb,'PSM_'+slug(sc.title+' '+sc.sub)+'.xlsx');toast('Excel — '+sc.title+' ('+sc.recs.length+' lines) downloaded.');
}catch(e){toast('Excel export failed: '+e.message,true);}}

async function exportPDF(){closeMenu();try{
  const sc=currentScope();if(!sc.recs.length){toast('Nothing to export in this view.',true);return;}
  toast('Building PDF…');await ensurePDF();
  const {jsPDF}=window.jspdf,doc=new jsPDF({orientation:'landscape',unit:'pt',format:'a4'}),T=scopedTables(sc.recs);
  const W=doc.internal.pageSize.width,H=doc.internal.pageSize.height;
  doc.setFillColor(38,52,73);doc.rect(0,0,W,58,'F');
  doc.setTextColor(255).setFontSize(15).setFont('helvetica','bold').text('PSM Results — '+sc.title,40,30);
  doc.setFontSize(9).setFont('helvetica','normal').setTextColor(200).text('Filter: '+sc.sub,40,46);
  doc.text(`${M.supplier} · Plant ${M.plant} · Data as of ${M.generated}`,W-40,46,{align:'right'});
  const pairs=[];for(let i=0;i<T.kpis.length;i+=2)pairs.push([T.kpis[i][0],T.kpis[i][1],(T.kpis[i+1]||['',''])[0],(T.kpis[i+1]||['',''])[1]]);
  doc.autoTable({startY:72,body:pairs,theme:'grid',styles:{fontSize:9,cellPadding:5},columnStyles:{0:{fontStyle:'bold',textColor:[76,97,125]},2:{fontStyle:'bold',textColor:[76,97,125]}},margin:{left:40,right:40}});
  const sec=(title,head,body,col)=>{if(!body.length)return;let y=doc.lastAutoTable.finalY+24;if(y>H-70){doc.addPage();y=50;}
    doc.setFontSize(12).setFont('helvetica','bold').setTextColor(38,52,73).text(title,40,y);
    doc.autoTable({startY:y+8,head:[head],body,theme:'striped',styles:{fontSize:8,cellPadding:4},headStyles:{fillColor:[51,65,92],textColor:255},margin:{left:40,right:40},columnStyles:col||{}});};
  sec('Summary by PO',['PO #','Lines','Ordered','Pending','Order value','Pending value','Overdue','Max delay'],T.byPO);
  sec('Summary by material',['Material','Description','Product','Lines','Pend qty','Pending value','Overdue','Max delay'],T.byMat);
  if(T.multiProd)sec('Summary by product',['Product','Lines','Ordered','Delivered','Pending','Order value','Pending value','Completion'],T.byProd);
  sec('Line detail',['PO','Ln','Material','Product','State','Ord','Pend','Value','Pend value','Exp ship','Current / ETA','Delay','Rem'],
    T.lines.map(r=>[r[0],r[1],r[2],r[4],r[5],r[6],r[7],usd(r[8]),usd(r[9]),r[10],r[11],r[12]===''?'':r[12]+'d',r[13]===''?'':r[13]+'d']));
  const pages=doc.internal.getNumberOfPages();for(let i=1;i<=pages;i++){doc.setPage(i);doc.setFontSize(8).setTextColor(150).text(`PSM · ${sc.title} · page ${i} of ${pages}`,W/2,H-16,{align:'center'});}
  doc.save('PSM_'+slug(sc.title+' '+sc.sub)+'.pdf');toast('PDF — '+sc.title+' ('+sc.recs.length+' lines) downloaded.');
}catch(e){toast(e.message==='offline'?'PDF export needs an internet connection to load the engine.':'PDF export failed: '+e.message,true);}}

window.exportExcel=exportExcel;window.exportPDF=exportPDF;

/* ---- boot: embedded data first, then try live data.json (for GitHub Pages) ---- */
setDataset(DATA);
fetch('./data.json',{cache:'no-store'}).then(r=>r.ok?r.json():null).then(j=>{if(j&&j.records&&j.records.length){setDataset(j);}}).catch(()=>{});
</script>
